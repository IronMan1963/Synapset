<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#121212; color:#e0e0e0; font-family:sans-serif; }
    nav { display:flex; justify-content:space-between; padding:1rem 2rem;
      background:#1e1e1e; position:sticky; top:0; }
    nav .logo { color:#2dd4bf; font-weight:bold; }
    nav a { color:#e0e0e0; text-decoration:none; margin-left:1rem; }
    nav a:focus { outline:2px solid #2dd4bf; }
    .hero { text-align:center; padding:4rem 1rem;
      background:linear-gradient(135deg,#1e1e1e,#2a2a2a); }
    .hero h1 { font-size:2.5rem; color:#2dd4bf; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:1.5rem; padding:2rem; }
    .cta { text-align:center; padding:3rem; }
    .cta button { padding:1rem 2rem; border:none; border-radius:8px;
      cursor:pointer; background:#2dd4bf; color:#121212; }
    @media(max-width:768px){ .hero h1{font-size:1.8rem;} nav{flex-direction:column;} }
  </style>
</head>
<body>
  <nav><div class="logo">Jane Doe</div>
    <div><a href="#projects">Projects</a><a href="#signup">Contact</a></div>
  </nav>
  <section class="hero"><h1>My Portfolio</h1><p>Showcasing my best work.</p></section>
  <section id="projects" class="grid">
    <div class="card"><h3>Project Alpha</h3><p>Web app design.</p></div>
    <div class="card"><h3>Project Beta</h3><p>Mobile dashboard.</p></div>
    <div class="card"><h3>Project Gamma</h3><p>Platform redesign.</p></div>
  </section>
  <section id="signup" class="cta"><h2>Get in Touch</h2><button>Sign Up</button></section>
  <footer><p>&copy; 2026 Jane Doe.</p></footer>
</body>
</html>
